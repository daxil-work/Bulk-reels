<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reel Workbench — use Vite</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        background: #04060a;
        color: #e8ecf4;
        padding: 2rem;
      }
      main {
        max-width: 32rem;
        text-align: center;
      }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 0.2em 0.45em;
        border-radius: 6px;
      }
      a {
        color: #b4d8ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Reel Workbench</h1>
      <p>
        This file is the old prototype. The app now runs through <strong>Vite + Tailwind</strong>.
      </p>
      <p>From the project folder, run:</p>
      <p><code>npm install</code> then <code>npm run dev</code></p>
      <p>Open the URL Vite prints (e.g. <a href="http://localhost:5173/">http://localhost:5173</a>).</p>
    </main>
  </body>
</html>
